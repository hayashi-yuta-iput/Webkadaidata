<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アーティスト紹介</title>
    <style>
        .main-content{
    display:block;
    font-size:0;
}

body{
    margin:0;
    padding:30px;
    background-color:#eeeeee; /* 薄い灰色 */
    font-family:Arial,sans-serif;
}

header{
    display:block;
    background-color:#162447;
    color:white;
    text-align:center;
    padding:20px;
    margin-bottom:20px;
}

.main-content{
    display:block;
    font-size:0;
}

.artist{
    display:inline-block;
    width:30%;
    margin:1.5%;
    padding:15px;
    box-sizing:border-box;
    vertical-align:top;
    background-color:white;
    border:2px solid #162447;
    border-radius:10px;
    font-size:16px;
}

.artist h2{
    text-align:center;
}

/* 曲紹介用の小ボックス */
.song-box{
    background-color:#f8f8f8;
    border:1px solid #cccccc;
    border-radius:8px;
    padding:10px;
    margin-top:10px;
}

.song-box h3{
    margin-top:0;
}

.footer{
    display:block;
    background-color:#162447;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:20px;
}
    </style>
</head>
<body>
    <header>
        <h1>アーティスト紹介</h1>
    </header>
    <div class="main-content">

    <!-- サカナクション -->
    <div class="artist">
        <h2>サカナクション</h2>

        <div class="song-box">
            <h3>好きな曲</h3>
            <ul>
                <li>白波トップウォーター</li>
                <li>プラトー</li>
                <li>ミュージック</li>
            </ul>
        </div>

        <div class="song-box">
            <h3>代表曲</h3>
            <ul>
                <li>新宝島</li>
                <li>怪獣</li>
                <li>わすれられないの</li>
            </ul>
        </div>
    </div>

    <!-- Eve -->
    <div class="artist">
        <h2>Eve</h2>

        <div class="song-box">
            <h3>好きな曲</h3>
            <ul>
                <li>群青賛歌</li>
                <li>お気に召すまま</li>
                <li>やどりぎ</li>
            </ul>
        </div>

        <div class="song-box">
            <h3>代表曲</h3>
            <ul>
                <li>廻廻奇譚</li>
                <li>ナンセンス文学</li>
                <li>ドラマツルギー</li>
            </ul>
        </div>
    </div>

    <!-- 米津玄師 -->
    <div class="artist">
        <h2>米津玄師</h2>

        <div class="song-box">
            <h3>好きな曲</h3>
            <ul>
                <li>春雷</li>
                <li>さよーならまたいつか！</li>
                <li>海の幽霊</li>
            </ul>
        </div>

        <div class="song-box">
            <h3>代表曲</h3>
            <ul>
                <li>Lemon</li>
                <li>Loser</li>
                <li>KICKBACK</li>
            </ul>
        </div>
    </div>

</div>

<div class="footer">
    
</div>




</body>
</html>
